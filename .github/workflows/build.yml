name: Build Hybrid CPU-GPU Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  #  Linux — ubuntu:18.04 container (GCC 5 native, GLIBC 2.27)
  #  checkout@v3 uses Node 16 which only needs GLIBC 2.17 ✓
  # ─────────────────────────────────────────────────────────────
  build-linux:
    name: Linux CUDA 8.0 sm_21 Fermi
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:18.04

    steps:
      - name: Install dependencies + GCC 5
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            wget ca-certificates git \
            gcc-5 g++-5 build-essential
          update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-5 50
          update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-5 50
          gcc --version

      # checkout@v3 = Node 16, needs GLIBC >= 2.17 — ubuntu:18.04 has 2.27 ✓
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install CUDA 8.0 via runfile
        run: |
          wget -q https://developer.nvidia.com/compute/cuda/8.0/Prod2/local_installers/cuda_8.0.61_375.26_linux-run \
               -O cuda_8.0_installer.run
          chmod +x cuda_8.0_installer.run
          sh cuda_8.0_installer.run --silent --toolkit --no-opengl-libs --override
          echo "/usr/local/cuda-8.0/bin" >> $GITHUB_PATH

      - name: Verify nvcc
        run: /usr/local/cuda-8.0/bin/nvcc --version

      - name: Compile hybrid_engine
        run: |
          /usr/local/cuda-8.0/bin/nvcc hybrid_engine.cu \
            -o hybrid_engine \
            -gencode arch=compute_21,code=sm_21 \
            -gencode arch=compute_35,code=sm_35 \
            -O3 \
            -std=c++14 \
            -ccbin g++-5 \
            -Xcompiler -pthread \
            -Xcompiler -O3 \
            -w

      - name: Smoke test (CPU-only mode on CI)
        run: ./hybrid_engine 2>&1 | tee build_output.txt

      - name: Upload binary
        uses: actions/upload-artifact@v3
        with:
          name: hybrid_engine_linux_cuda8_sm21
          path: hybrid_engine
          retention-days: 30

      - name: Upload build log
        uses: actions/upload-artifact@v3
        with:
          name: build_log
          path: build_output.txt
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  #  Windows — CUDA 11.8 sm_35 (no Fermi support post CUDA 9)
  #  Use this .exe if you ever swap to a Kepler GT730 variant
  # ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows CUDA 11.8 sm_35
    runs-on: windows-2022
    needs: build-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install CUDA 11.8
        uses: Jimver/cuda-toolkit@v0.2.11
        with:
          cuda: '11.8.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "visual_studio_integration"]'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile hybrid_engine
        shell: cmd
        run: |
          nvcc hybrid_engine.cu ^
            -o hybrid_engine.exe ^
            -gencode arch=compute_35,code=sm_35 ^
            -gencode arch=compute_50,code=sm_50 ^
            -O3 ^
            -std=c++14 ^
            -Xcompiler /O2 ^
            -w

      - name: Upload Windows binary
        uses: actions/upload-artifact@v3
        with:
          name: hybrid_engine_windows_sm35
          path: hybrid_engine.exe
          retention-days: 30
