name: Build Hybrid CPU-GPU Engine

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:    # lets you click "Run workflow" manually in GitHub UI

jobs:
  build:
    name: Compile with NVCC (CUDA 8.0 / sm_21 Fermi)
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:16.04

    steps:
    - name: Install CUDA 8.0 from NVIDIA apt repo
      run: |
        apt-get update -qq
        apt-get install -y --no-install-recommends wget gnupg ca-certificates git
        wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu1604/x86_64/cuda-repo-ubuntu1604_8.0.61-1_amd64.deb
        dpkg -i cuda-repo-ubuntu1604_8.0.61-1_amd64.deb
        apt-get update -qq
        apt-get install -y --no-install-recommends \
          cuda-nvcc-8-0 \
          cuda-cudart-dev-8-0 \
          cuda-crt-8-0
        echo "PATH=/usr/local/cuda-8.0/bin:$PATH" >> $GITHUB_ENV

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify nvcc
      run: /usr/local/cuda-8.0/bin/nvcc --version

    - name: Compile hybrid_engine
      run: |
        /usr/local/cuda-8.0/bin/nvcc hybrid_engine.cu \
          -o hybrid_engine \
          -gencode arch=compute_21,code=sm_21 \
          -gencode arch=compute_35,code=sm_35 \
          -O3 \
          -std=c++14 \
          -Xcompiler -pthread \
          -Xcompiler -O3 \
          -w

    # ── 5. Run the built binary (no GPU on CI, uses CPU-only) ─
    - name: Smoke test (CPU-only mode on CI)
      run: |
        ./hybrid_engine 2>&1 | tee build_output.txt
        echo "Exit code: $?"

    # ── 6. Upload the compiled binary as a release artifact ───
    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: hybrid_engine_linux_x64
        path: hybrid_engine
        retention-days: 30

    # ── 7. Also upload build log ──────────────────────────────
    - name: Upload build log
      uses: actions/upload-artifact@v4
      with:
        name: build_log
        path: build_output.txt
        retention-days: 7

  # ── Optional: Windows build (for running on your PC) ─────────
  build-windows:
    name: Compile for Windows (for your actual PC)
    runs-on: windows-2019
    needs: build    # only run if Linux build passed

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install CUDA Toolkit on Windows
      uses: Jimver/cuda-toolkit@v0.2.11
      id: cuda-toolkit
      with:
        cuda: '11.8.0'
        method: 'network'
        sub-packages: '["nvcc", "cudart", "visual_studio_integration"]'

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Compile hybrid_engine (Windows)
      shell: cmd
      run: |
        nvcc hybrid_engine.cu ^
          -o hybrid_engine.exe ^
          -gencode arch=compute_35,code=sm_35 ^
          -gencode arch=compute_50,code=sm_50 ^
          -O3 ^
          -std=c++17 ^
          -Xcompiler /O2 ^
          -w

    - name: Upload Windows binary
      uses: actions/upload-artifact@v4
      with:
        name: hybrid_engine_windows_x64
        path: hybrid_engine.exe
        retention-days: 30
