name: Build Hybrid CPU-GPU Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux CUDA 8.0 sm_21 Fermi
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build inside ubuntu:18.04 via docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ubuntu:18.04 \
            bash -exc '
              # ── 1. System packages ──────────────────────────
              apt-get update -qq
              apt-get install -y --no-install-recommends \
                wget ca-certificates gcc-5 g++-5 build-essential
              update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-5 50
              update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-5 50
              gcc --version

              # ── 2. Download CUDA 8.0 runfile (verbose) ─────
              echo "[STEP] Downloading CUDA 8.0 runfile..."
              wget --progress=dot:giga \
                https://developer.nvidia.com/compute/cuda/8.0/Prod2/local_installers/cuda_8.0.61_375.26_linux-run \
                -O /tmp/cuda_installer.run
              ls -lh /tmp/cuda_installer.run
              chmod +x /tmp/cuda_installer.run

              # ── 3. Install toolkit (verbose, no driver) ────
              echo "[STEP] Installing CUDA 8.0 toolkit..."
              sh /tmp/cuda_installer.run --silent \
                --toolkit \
                --no-opengl-libs \
                --override \
                --verbose \
                2>&1 || true

              # ── 4. Confirm nvcc exists ─────────────────────
              echo "[STEP] Looking for nvcc..."
              find /usr/local -name "nvcc" 2>/dev/null || echo "nvcc not found in /usr/local"
              ls /usr/local/ || true

              NVCC=$(find /usr/local -name "nvcc" 2>/dev/null | head -1)
              if [ -z "$NVCC" ]; then
                echo "[ERROR] nvcc not found after install. Aborting."
                exit 1
              fi
              echo "[OK] nvcc found at: $NVCC"
              $NVCC --version

              # ── 5. Compile ─────────────────────────────────
              echo "[STEP] Compiling hybrid_engine.cu..."
              $NVCC hybrid_engine.cu \
                -o hybrid_engine \
                -gencode arch=compute_21,code=sm_21 \
                -gencode arch=compute_35,code=sm_35 \
                -O3 \
                -std=c++14 \
                -ccbin g++-5 \
                -Xcompiler -pthread \
                -Xcompiler -O3 \
                -w
              echo "[DONE] Compile successful."
              ls -lh hybrid_engine
            '

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: hybrid_engine_linux_cuda8_sm21
          path: hybrid_engine
          retention-days: 30

  build-windows:
    name: Windows CUDA 11.8 sm_35
    runs-on: windows-2022
    needs: build-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CUDA 11.8
        uses: Jimver/cuda-toolkit@v0.2.11
        with:
          cuda: '11.8.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "visual_studio_integration"]'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile
        shell: cmd
        run: |
          nvcc hybrid_engine.cu ^
            -o hybrid_engine.exe ^
            -gencode arch=compute_35,code=sm_35 ^
            -gencode arch=compute_50,code=sm_50 ^
            -O3 -std=c++14 ^
            -Xcompiler /O2 ^
            -w

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: hybrid_engine_windows_sm35
          path: hybrid_engine.exe
          retention-days: 30
