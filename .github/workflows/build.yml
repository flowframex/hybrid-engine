name: Build Hybrid CPU-GPU Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  #  Linux — CUDA 8.0 + GCC 5 from toolchain PPA (Fermi sm_21)
  # ─────────────────────────────────────────────────────────────
  build-linux:
    name: Linux CUDA 8.0 (sm_21 Fermi)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC-5 from ubuntu-toolchain-r PPA
        run: |
          sudo apt-get update -y
          sudo apt-get install -y software-properties-common wget
          # This PPA is the only place GCC 5 still lives for Ubuntu 22.04
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -y
          sudo apt-get install -y gcc-5 g++-5
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-5 50
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-5 50
          gcc --version

      - name: Install CUDA 8.0 via runfile
        run: |
          wget -q https://developer.nvidia.com/compute/cuda/8.0/Prod2/local_installers/cuda_8.0.61_375.26_linux-run \
               -O cuda_8.0_installer.run
          chmod +x cuda_8.0_installer.run
          sudo sh cuda_8.0_installer.run --silent --toolkit --no-opengl-libs --override
          echo "/usr/local/cuda-8.0/bin" >> $GITHUB_PATH

      - name: Verify nvcc
        run: nvcc --version

      - name: Compile hybrid_engine
        run: |
          nvcc hybrid_engine.cu \
            -o hybrid_engine \
            -gencode arch=compute_21,code=sm_21 \
            -gencode arch=compute_35,code=sm_35 \
            -O3 \
            -std=c++14 \
            -ccbin g++-5 \
            -Xcompiler -pthread \
            -Xcompiler -O3 \
            -w

      - name: Smoke test (CPU-only on CI)
        run: ./hybrid_engine 2>&1 | tee build_output.txt

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: hybrid_engine_linux_x64
          path: hybrid_engine
          retention-days: 30

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build_log
          path: build_output.txt
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  #  Windows — for your actual PC
  # ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows MSVC (sm_21 + sm_35)
    runs-on: windows-2022
    needs: build-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit 11.8
        uses: Jimver/cuda-toolkit@v0.2.11
        with:
          cuda: '11.8.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "visual_studio_integration"]'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile hybrid_engine (Windows)
        shell: cmd
        run: |
          nvcc hybrid_engine.cu ^
            -o hybrid_engine.exe ^
            -gencode arch=compute_35,code=sm_35 ^
            -gencode arch=compute_50,code=sm_50 ^
            -O3 ^
            -std=c++14 ^
            -Xcompiler /O2 ^
            -w

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: hybrid_engine_windows_x64
          path: hybrid_engine.exe
          retention-days: 30
