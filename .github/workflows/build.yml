name: Build Hybrid CPU-GPU Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  #  Linux — checkout on host (ubuntu-22.04), compile inside
  #  ubuntu:18.04 docker manually (GCC 5 + CUDA 8.0)
  # ─────────────────────────────────────────────────────────────
  build-linux:
    name: Linux CUDA 8.0 sm_21 Fermi
    runs-on: ubuntu-22.04  # NO container here — checkout runs on host

    steps:
      # Checkout runs on ubuntu-22.04 host — no GLIBC issue
      - name: Checkout
        uses: actions/checkout@v4

      # Now spin up ubuntu:18.04 manually just for the compile step
      # Mount the workspace so the container can see our files
      - name: Build inside ubuntu:18.04 container (GCC5 + CUDA 8.0)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ubuntu:18.04 \
            bash -c "
              set -e
              apt-get update -qq
              apt-get install -y --no-install-recommends wget ca-certificates gcc-5 g++-5 build-essential
              update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-5 50
              update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-5 50
              gcc --version

              wget -q https://developer.nvidia.com/compute/cuda/8.0/Prod2/local_installers/cuda_8.0.61_375.26_linux-run \
                   -O /tmp/cuda_8.0_installer.run
              chmod +x /tmp/cuda_8.0_installer.run
              sh /tmp/cuda_8.0_installer.run --silent --toolkit --no-opengl-libs --override

              /usr/local/cuda-8.0/bin/nvcc --version

              /usr/local/cuda-8.0/bin/nvcc hybrid_engine.cu \
                -o hybrid_engine \
                -gencode arch=compute_21,code=sm_21 \
                -gencode arch=compute_35,code=sm_35 \
                -O3 \
                -std=c++14 \
                -ccbin g++-5 \
                -Xcompiler -pthread \
                -Xcompiler -O3 \
                -w

              echo 'Compile done!'
              ./hybrid_engine
            "

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: hybrid_engine_linux_cuda8_sm21
          path: hybrid_engine
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  #  Windows — CUDA 11.8 sm_35
  # ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows CUDA 11.8 sm_35
    runs-on: windows-2022
    needs: build-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CUDA 11.8
        uses: Jimver/cuda-toolkit@v0.2.11
        with:
          cuda: '11.8.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "visual_studio_integration"]'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile hybrid_engine
        shell: cmd
        run: |
          nvcc hybrid_engine.cu ^
            -o hybrid_engine.exe ^
            -gencode arch=compute_35,code=sm_35 ^
            -gencode arch=compute_50,code=sm_50 ^
            -O3 ^
            -std=c++14 ^
            -Xcompiler /O2 ^
            -w

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: hybrid_engine_windows_sm35
          path: hybrid_engine.exe
          retention-days: 30
